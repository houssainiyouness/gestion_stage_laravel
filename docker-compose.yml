services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_stage_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gestion_stage_network

  nginx:
    image: nginx:1.27-alpine
    container_name: gestion_stage_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gestion_stage_network

  db:
    image: mysql:8.0
    container_name: gestion_stage_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gestion_stage
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gestion_stage_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gestion_stage_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - gestion_stage_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: gestion_stage_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - gestion_stage_network

volumes:
  db_data:

networks:
  gestion_stage_network:
    driver: bridge
